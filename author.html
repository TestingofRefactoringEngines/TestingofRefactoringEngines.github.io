    function toggleLanguage() {
        currentLang = (currentLang === 'zh') ? 'en' : 'zh';
        document.getElementById('lang-label').innerText = (currentLang === 'zh') ? 'EN' : '中';

        document.querySelectorAll('.lang-item').forEach(item => {
            const text = item.getAttribute(`data-${currentLang}`);
            if (text) item.innerText = text;
        });

        initSelector();
        switchAuthor(currentAuthorId);
    }

    function switchAuthor(id) {
        currentAuthorId = id;
        const data = teamData[id][currentLang]; 
        
        document.querySelectorAll('.author-tab').forEach(el => el.classList.remove('active'));
        const activeTab = document.getElementById(`tab-${id}`);
        if(activeTab) activeTab.classList.add('active');
        
        const wrapper = document.getElementById('content-wrapper');
        wrapper.classList.remove('fade-in');
        void wrapper.offsetWidth; 
        wrapper.classList.add('fade-in');

        document.getElementById('display-name').innerText = data.name;
        document.getElementById('display-initials').innerText = teamData[id].initials;
        document.getElementById('display-title').innerText = data.title;
        document.getElementById('display-loc').innerText = data.loc;
        document.getElementById('display-email').innerText = `✉️ ${teamData[id].email}`;
        document.getElementById('display-bio').innerText = data.bio;
        document.getElementById('display-url').href = teamData[id].url;

        document.getElementById('display-interests').innerHTML = data.interests.map(i => 
            `<span class="px-4 py-2 bg-cyan-500/10 border border-cyan-500/20 rounded-full text-xs text-cyan-400 italic font-medium">${i}</span>`
        ).join('');

        document.getElementById('display-papers').innerHTML = data.papers.map(p => `
            <div class="group">
                <div class="text-[10px] font-mono text-slate-500 mb-1 tracking-widest">${p.conf}</div>
                <h4 class="font-bold text-slate-200 group-hover:text-cyan-400 transition italic tracking-tight text-sm leading-snug">${p.title}</h4>
            </div>
        `).join('');

        document.getElementById('display-edu').innerHTML = data.edu.map(e => `
            <div class="relative pl-8">
                <div class="absolute left-[-5px] top-1 w-2 h-2 ${e.active ? 'bg-cyan-500 shadow-[0_0_10px_rgba(6,182,212,0.5)]' : 'bg-slate-700'} rounded-full"></div>
                <div class="text-sm font-bold italic text-slate-200">${e.school}</div>
                <div class="text-[11px] text-slate-500 italic">${e.degree} | ${e.time}</div>
            </div>
        `).join('');
    }

                <div class="hidden md:block text-left">
                    <div class="text-xs font-bold italic">${person.name}</div>
                    <div class="text-[9px] text-slate-500 italic tracking-tighter">${person.title.split(' / ')[0]}</div>
                </div>
            </button>
        `}).join('');
    }

    window.onload = () => {
        initSelector();
        switchAuthor('dong');
    };
</script>
</body>
</html>
